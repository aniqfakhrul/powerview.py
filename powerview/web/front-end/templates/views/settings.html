<!-- Settings Panel -->
<div id="settings-panel" class="fixed top-0 right-0 bottom-0 w-96 bg-white dark:bg-neutral-900 border-l border-neutral-300 dark:border-neutral-700 shadow-2xl shadow-neutral-950/10 dark:shadow-black/50 transform transition-transform duration-300 ease-in-out translate-x-full z-50 hidden">
    <div class="flex items-center justify-between gap-2 p-4 border-b sticky top-0 bg-white dark:bg-neutral-900 z-10 border-neutral-200 dark:border-neutral-700">
        <div class="flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-500 dark:text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <h2 class="text-lg font-semibold text-neutral-900 dark:text-white">Settings</h2>
        </div>
        <button id="close-settings-panel" class="text-neutral-500 hover:text-neutral-700 dark:text-neutral-400 dark:hover:text-neutral-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <div class="p-5 space-y-5 overflow-y-auto scrollbar" style="max-height: calc(100vh - 57px);">

        <!-- LDAP Section -->
        <div>
            <div class="pv-section-label">LDAP</div>
            <div class="space-y-3">
                <!-- Obfuscate Toggle -->
                <div class="flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <h3 class="text-sm font-medium text-neutral-900 dark:text-white">Obfuscate</h3>
                        <p class="text-xs text-neutral-500 dark:text-neutral-400 mt-0.5">Obfuscate LDAP queries</p>
                    </div>
                    <label class="pv-toggle">
                        <input type="checkbox" id="obfuscate-toggle" disabled>
                        <div class="pv-toggle-track"></div>
                        <div class="pv-toggle-knob"></div>
                    </label>
                </div>

                <!-- Cache Toggle -->
                <div class="flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <h3 class="text-sm font-medium text-neutral-900 dark:text-white">Cache</h3>
                        <p class="text-xs text-neutral-500 dark:text-neutral-400 mt-0.5">Cache LDAP query results</p>
                    </div>
                    <label class="pv-toggle">
                        <input type="checkbox" id="cache-toggle" disabled>
                        <div class="pv-toggle-track"></div>
                        <div class="pv-toggle-knob"></div>
                    </label>
                </div>

                <!-- Vuln Check Toggle -->
                <div class="flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <h3 class="text-sm font-medium text-neutral-900 dark:text-white">Vulnerability Checks</h3>
                        <p class="text-xs text-neutral-500 dark:text-neutral-400 mt-0.5">Run security checks on results</p>
                    </div>
                    <label class="pv-toggle">
                        <input type="checkbox" id="vuln-check-toggle" disabled>
                        <div class="pv-toggle-track"></div>
                        <div class="pv-toggle-knob"></div>
                    </label>
                </div>
            </div>
        </div>

        <!-- Plugins Section -->
        <div class="border-t border-neutral-200 dark:border-neutral-700/50 pt-5">
            <div class="pv-section-label">Plugins</div>
            <div id="plugins-container" class="space-y-2">
                <div class="flex items-center gap-2 py-3">
                    <div class="w-3 h-3 border-2 border-neutral-300 dark:border-neutral-600 border-t-yellow-500 rounded-full animate-spin"></div>
                    <span class="text-xs text-neutral-500 dark:text-neutral-400">Loading plugins...</span>
                </div>
            </div>
        </div>
    </div>
</div>
